<header class="navbar-header">

  <div class="logo-container">
    <img src="favicon.ico" alt="Logo" width="32" height="32" class="logo-img">
    <a class="logo-text" routerLink="/publicaciones">Arrow</a>
  </div>

  <nav class="nav-menu">
    <ul class="nav-list">

      @if (!this.authService.usuarioActual()) {
      <li>
        <a routerLink="/registro" routerLinkActive="active-link" class="nav-link">
          Registrarse
        </a>
      </li>
      <li>
        <a routerLink="/login" routerLinkActive="active-link" class="nav-link">
          Iniciar Sesión
        </a>
      </li>

      }
      @else {

      <li>
        <a routerLink="/publicaciones" routerLinkActive="active-link" class="nav-link">
          Publicaciones
        </a>
      </li>
      <li>
        <a routerLink="/mi-perfil" routerLinkActive="active-link" class="nav-link">
          Mi Perfil
        </a>
      </li>

      @if(this.authService.isPremium()) {
      <li>
        <a routerLink="/dashboard/usuarios" routerLinkActive="active-link" class="nav-link">
          Administración
        </a>
      </li>
      }
      <li>
        <a routerLinkActive="active-link" class="nav-link" (click)="this.authService.logout()">Cerrar sesión</a>
      </li>
      }
    </ul>
  </nav>
</header>

<main class="main-content">
  <router-outlet />
</main>
